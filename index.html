<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반짝반짝 구구단 모험!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <!-- 전체 화면 효과 레이어 -->
        <div id="effect-layer" class="effect-layer hidden"></div>

        <header>
            <h1 id="game-title">✨ 반짝반짝 구구단 모험! ✨</h1>
            <div class="score-board">
                <span>점수: <span id="score">0</span></span>
                <span>남은 기회: <span id="lives">❤️❤️❤️</span></span>
            </div>
        </header>

        <main id="game-screen">
            <div class="problem-card" id="problem-card">
                <span id="num1">?</span>
                <span class="operator">×</span>
                <span id="num2">?</span>
                <span class="operator">=</span>
                <span id="answer-placeholder">?</span>
            </div>

            <div class="options-container" id="options">
                <!-- 선택지 버튼들이 여기에 생성됩니다 -->
            </div>

            <div id="feedback" class="feedback-msg"></div>
        </main>

        <div id="start-screen" class="overlay">
            <div class="overlay-content">
                <h2>반가워요, 꼬마 수학자!</h2>
                <p>구구단 문제를 풀고 별을 모아봐요!</p>
                <button id="start-btn">게임 시작!</button>
            </div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <div class="overlay-content">
                <h2>게임 끝!</h2>
                <p>최종 점수: <span id="final-score">0</span>점</p>
                <button id="restart-btn">다시 하기</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
