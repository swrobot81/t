<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>반짝반짝 수학 모험!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <!-- 전체 화면 효과 레이어 -->
        <div id="effect-layer" class="effect-layer hidden"></div>

        <!-- [시작 화면] -->
        <div id="start-screen" class="screen">
            <h1 class="main-title">✨ 수학 모험 ✨</h1>
            <p class="subtitle">반가워요! 정보를 입력하고 시작해볼까요?</p>
            
            <div class="input-group">
                <label for="nickname">내 이름(별명)</label>
                <input type="text" id="nickname" placeholder="여기에 입력하세요!" maxlength="8">
            </div>

            <div class="selection-section">
                <h3>학년 선택</h3>
                <div class="grade-grid">
                    <button class="grade-btn" data-grade="1">1</button>
                    <button class="grade-btn" data-grade="2">2</button>
                    <button class="grade-btn" data-grade="3">3</button>
                    <button class="grade-btn" data-grade="4">4</button>
                    <button class="grade-btn" data-grade="5">5</button>
                    <button class="grade-btn" data-grade="6">6</button>
                </div>
            </div>

            <div class="selection-section">
                <h3>난이도 선택</h3>
                <div class="difficulty-flex">
                    <button class="diff-btn" data-diff="easy">초보</button>
                    <button class="diff-btn selected" data-diff="medium">베테랑</button>
                    <button class="diff-btn" data-diff="hard">마스터</button>
                </div>
            </div>

            <button id="start-game-btn" class="primary-btn">모험 시작하기! 🚀</button>
        </div>

        <!-- [게임 화면] -->
        <div id="game-screen" class="screen hidden">
            <header>
                <div class="progress-container">
                    <div class="progress-bar" id="pb-fill"></div>
                    <div id="game-progress" class="game-progress">
                        <span class="q-label">문제</span>
                        <span id="current-q" class="q-num">1</span> 
                        <span class="q-total">/ 10</span>
                    </div>
                </div>
                <div class="score-board">
                    <span>점수: <span id="score">0</span></span>
                    <span id="lives">❤️❤️❤️</span>
                </div>
            </header>

            <main>
                <div class="problem-card" id="problem-card">
                    <div id="shape-visual" class="shape-visual"></div>
                    <div class="problem-text">
                        <span id="num1">?</span>
                        <span class="operator">×</span>
                        <span id="num2">?</span>
                        <span id="answer-placeholder">?</span>
                    </div>
                </div>

                <div class="options-container" id="options">
                    <!-- 선택지 버튼들이 여기에 생성됩니다 -->
                </div>

                <!-- [하단 종료 버튼] -->
                <button id="quit-btn" class="quit-btn">그만하기 🏠</button>
            </main>
        </div>

        <!-- [결과 화면] -->
        <div id="game-over-screen" class="screen hidden">
            <h2 class="game-over-title">🎉 모험 종료! 🎉</h2>
            <div class="result-summary">
                <p><span id="result-nickname"></span>님의 최종 점수</p>
                <div class="final-score-display"><span id="final-score">0</span>점</div>
            </div>

            <div class="leaderboard-container">
                <h3>🏆 명예의 전당</h3>
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>순위</th>
                            <th>별명</th>
                            <th>학년</th>
                            <th>점수</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>

            <button id="restart-btn" class="primary-btn">다시 하기</button>
        </div>

        <div class="version-badge">Ver 2.6</div>
    </div>

    <!-- 전체 화면 피드백 오버레이 -->
    <div id="feedback-overlay" class="hidden">
        <div id="fb-icon" class="feedback-bubble">🎉</div>
        <div id="fb-text" class="feedback-msg">정답이에요!</div>
        <div id="fb-answer" class="ans-hint hidden">정답: 100</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
